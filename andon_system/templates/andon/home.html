<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProcessGuard AI Login</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='andon/css/andon.css') }}" rel="stylesheet">
</head>
<body class="andon-shell">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-5">
        <div class="card andon-panel">
          <div class="card-body p-4">
            <p class="eyebrow mb-2">ProcessGuard AI</p>
            <h1 class="h3 mb-2">Sign in</h1>
            <p class="text-secondary mb-4">Use your username or email to access your assigned company views.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="post" action="{{ url_for('pages.login_page') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
              <div class="mb-3">
                <label class="form-label" for="identity">Username or email</label>
                <input class="form-control" id="identity" name="identity" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
