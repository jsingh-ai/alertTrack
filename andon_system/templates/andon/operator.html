{% extends "andon/base.html" %}
{% block body_class %}button-board-shell operator-shell{% endblock %}
{% block content %}
<div class="container-fluid button-board-shell">
  <div class="operator-top-strip">
    <div class="operator-top-strip__company">{{ current_company.name if current_company else "Operator" }}</div>
  </div>
  <div class="operator-layout-shell">
    <div class="operator-board-shell mt-0">
      <div class="operator-board-stage" id="operatorBoardStage">
        <div class="operator-board-stage__inner" id="operatorBoardStageInner">
          <div id="machineBoard" class="vstack gap-1"></div>
          <div id="operatorStatusDock" class="operator-status-dock" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='andon/js/operator.js') }}" defer></script>
{% endblock %}
